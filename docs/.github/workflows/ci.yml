③ .github/workflows/ci.yml（自动测试）

yaml
name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install flask pytest
      - run: pytest tests/ -v
      - run: python app.py & sleep 3 && curl http://localhost:5000
